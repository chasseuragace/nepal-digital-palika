# Nepal Digital Tourism — Supabase gateway proxy.
#
# Splice this into the existing https server block of
# /etc/nginx/sites-enabled/dev.conf (the one with
# `server_name dev.kaha.com.np www.dev.kaha.com.np`).
#
# Shape:  https://dev.kaha.com.np/tourism-supabase/ -> 127.0.0.1:8010/
# Kong (inside Docker) listens on 127.0.0.1:8010 via docker-compose port
# mapping; the trailing slash on proxy_pass strips the /tourism-supabase
# prefix so Kong sees /auth/v1/..., /rest/v1/..., /storage/v1/... at root.

location /tourism-supabase/ {
    proxy_pass http://127.0.0.1:8010/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Preserve websockets if a future service ever needs them.
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $http_connection;

    # Supabase storage signed-URL downloads + image uploads can be large.
    client_max_body_size   50m;
    proxy_read_timeout     300s;
    proxy_connect_timeout  60s;
    proxy_send_timeout     300s;

    # Kong already emits CORS headers driven by kong.yml's cors plugin,
    # so nginx should not add its own Access-Control-Allow-* headers here
    # or browsers will reject duplicate values. If you want nginx to own
    # CORS instead, remove the `cors` plugin from every service in
    # volumes/kong.yml first.
}
