openapi: 3.0.3
info:
  title: Nepal Digital Tourism Infrastructure API
  description: |
    Complete API specification for the Nepal Digital Tourism Infrastructure platform.
    
    This API serves:
    - Mobile applications (Android/iOS)
    - Web portals (public-facing)
    - Admin CMS (Palika staff management)
    
    **Authentication:**
    - Public endpoints: No authentication required
    - User endpoints: JWT Bearer token (obtained via OTP)
    - Admin endpoints: JWT Bearer token (email/password login)
    
    **Base URL:** `https://api.palika.gov.np/v1`
    
  version: 1.0.0
  contact:
    name: API Support
    email: api-support@palika.gov.np
  license:
    name: Government of Nepal
    
servers:
  - url: https://api.palika.gov.np/v1
    description: Production server
  - url: https://staging-api.palika.gov.np/v1
    description: Staging server
  - url: http://localhost:3000/v1
    description: Local development

tags:
  - name: Public
    description: Public endpoints (no authentication required)
  - name: Authentication
    description: User and admin authentication
  - name: Users
    description: User profile and preferences
  - name: Heritage Sites
    description: Heritage sites and monuments
  - name: Events
    description: Events and festivals
  - name: Businesses
    description: Business directory and marketplace
  - name: Inquiries
    description: Business inquiries and bookings
  - name: Reviews
    description: Reviews and ratings
  - name: SOS
    description: Emergency SOS system
  - name: Notifications
    description: Push notifications
  - name: Favorites
    description: User saved content
  - name: Search
    description: Global search functionality
  - name: Admin
    description: Admin and CMS operations

paths:
  # ==========================================
  # PUBLIC ENDPOINTS
  # ==========================================
  
  /health:
    get:
      tags: [Public]
      summary: Health check
      description: Check API server health status
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 1.0.0
  
  /palikas:
    get:
      tags: [Public]
      summary: List all Palikas
      description: Get list of all Palikas with optional filtering
      parameters:
        - name: province_id
          in: query
          schema:
            type: integer
          description: Filter by province
        - name: district_id
          in: query
          schema:
            type: integer
          description: Filter by district
        - name: type
          in: query
          schema:
            type: string
            enum: [metropolitan, sub-metropolitan, municipality, rural]
          description: Filter by Palika type
        - name: search
          in: query
          schema:
            type: string
          description: Search by name
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of Palikas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Palika'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
  
  /palikas/{id}:
    get:
      tags: [Public]
      summary: Get Palika details
      parameters:
        - $ref: '#/components/parameters/PalikaId'
      responses:
        '200':
          description: Palika details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Palika'
        '404':
          $ref: '#/components/responses/NotFound'

  /heritage-sites:
    get:
      tags: [Public, Heritage Sites]
      summary: List heritage sites
      description: Get paginated list of heritage sites with filtering
      parameters:
        - name: palika_id
          in: query
          schema:
            type: integer
          description: Filter by Palika
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category (temple, stupa, monastery, etc.)
        - name: heritage_status
          in: query
          schema:
            type: string
            enum: [unesco, national, provincial, local]
        - name: near
          in: query
          schema:
            type: string
          description: "Lat,Lng coordinates for proximity search (e.g., 27.7172,85.3240)"
        - name: radius
          in: query
          schema:
            type: number
            default: 10
          description: Search radius in kilometers (used with 'near')
        - name: status
          in: query
          schema:
            type: string
            enum: [published]
            default: published
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, created_at, view_count, distance]
            default: name
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of heritage sites
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HeritageSite'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /heritage-sites/{id}:
    get:
      tags: [Public, Heritage Sites]
      summary: Get heritage site details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Heritage site details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HeritageSite'
        '404':
          $ref: '#/components/responses/NotFound'

  /heritage-sites/slug/{slug}:
    get:
      tags: [Public, Heritage Sites]
      summary: Get heritage site by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          example: bindabasini-temple
      responses:
        '200':
          description: Heritage site details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HeritageSite'

  /events:
    get:
      tags: [Public, Events]
      summary: List events and festivals
      parameters:
        - name: palika_id
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: from_date
          in: query
          schema:
            type: string
            format: date
          description: Filter events starting from this date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
          description: Filter events until this date
        - name: upcoming
          in: query
          schema:
            type: boolean
            default: true
          description: Only show upcoming events
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /events/{id}:
    get:
      tags: [Public, Events]
      summary: Get event details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Event'

  /businesses:
    get:
      tags: [Public, Businesses]
      summary: List businesses
      parameters:
        - name: palika_id
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
          description: "Business type: accommodation, restaurant, shop, guide, producer, service"
        - name: sub_category
          in: query
          schema:
            type: string
        - name: verified_only
          in: query
          schema:
            type: boolean
            default: false
        - name: near
          in: query
          schema:
            type: string
          description: "Lat,Lng for proximity search"
        - name: radius
          in: query
          schema:
            type: number
            default: 10
        - name: min_rating
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 5
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, rating, distance, created_at]
            default: rating
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of businesses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Business'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /businesses/{id}:
    get:
      tags: [Public, Businesses]
      summary: Get business details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Business details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Business'

  /search:
    get:
      tags: [Public, Search]
      summary: Global search
      description: Search across heritage sites, events, and businesses
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: palika_id
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [all, heritage_sites, events, businesses]
            default: all
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      heritage_sites:
                        type: array
                        items:
                          $ref: '#/components/schemas/HeritageSite'
                      events:
                        type: array
                        items:
                          $ref: '#/components/schemas/Event'
                      businesses:
                        type: array
                        items:
                          $ref: '#/components/schemas/Business'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  # ==========================================
  # AUTHENTICATION
  # ==========================================
  
  /auth/send-otp:
    post:
      tags: [Authentication]
      summary: Send OTP for login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: "+9779841234567"
                  description: Phone number with country code
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OTP sent to +977-984-XXX-4567"
                  expires_in:
                    type: integer
                    example: 300
                    description: OTP expiry in seconds
        '429':
          description: Too many OTP requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify-otp:
    post:
      tags: [Authentication]
      summary: Verify OTP and get auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - otp
              properties:
                phone:
                  type: string
                  example: "+9779841234567"
                otp:
                  type: string
                  example: "123456"
                device_token:
                  type: string
                  description: FCM token for push notifications
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                    example: "Bearer"
                  expires_in:
                    type: integer
                    example: 900
                    description: Access token expiry in seconds
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer

  /auth/admin/login:
    post:
      tags: [Authentication, Admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Admin authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                    example: "Bearer"
                  expires_in:
                    type: integer
                  admin:
                    $ref: '#/components/schemas/AdminUser'

  # ==========================================
  # USER PROFILE
  # ==========================================
  
  /user/profile:
    get:
      tags: [Users]
      summary: Get user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
    
    put:
      tags: [Users]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                user_type:
                  type: string
                  enum: [resident, tourist_domestic, tourist_international]
                default_palika_id:
                  type: integer
                preferences:
                  type: object
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'

  /user/device-token:
    post:
      tags: [Users]
      summary: Register device token for notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: FCM device token
                platform:
                  type: string
                  enum: [android, ios, web]
      responses:
        '200':
          description: Token registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Device token registered"

  # ==========================================
  # FAVORITES
  # ==========================================
  
  /user/favorites:
    get:
      tags: [Users, Favorites]
      summary: Get user's saved favorites
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [heritage_site, event, business]
          description: Filter by entity type
      responses:
        '200':
          description: List of favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Favorite'
    
    post:
      tags: [Users, Favorites]
      summary: Add to favorites
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_type
                - entity_id
              properties:
                entity_type:
                  type: string
                  enum: [heritage_site, event, business]
                entity_id:
                  type: string
                  format: uuid
                personal_note:
                  type: string
      responses:
        '201':
          description: Added to favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Favorite'

  /user/favorites/{id}:
    delete:
      tags: [Users, Favorites]
      summary: Remove from favorites
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Removed from favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ==========================================
  # INQUIRIES
  # ==========================================
  
  /inquiries:
    post:
      tags: [Inquiries]
      summary: Create business inquiry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - business_id
                - inquiry_data
              properties:
                business_id:
                  type: string
                  format: uuid
                inquiry_data:
                  type: object
                  description: "Flexible data based on business type"
                  example:
                    check_in: "2025-10-28"
                    check_out: "2025-10-30"
                    guests: 2
                    room_type: "double"
                    special_requests: "Need vegetarian meals"
      responses:
        '201':
          description: Inquiry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Inquiry'
    
    get:
      tags: [Inquiries]
      summary: Get user's inquiries
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, contacted, confirmed, completed, cancelled]
      responses:
        '200':
          description: List of inquiries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Inquiry'

  /inquiries/{id}:
    get:
      tags: [Inquiries]
      summary: Get inquiry details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Inquiry details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Inquiry'

  /inquiries/{id}/confirm:
    post:
      tags: [Inquiries]
      summary: Confirm inquiry/booking completed (customer side)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Inquiry confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ==========================================
  # REVIEWS
  # ==========================================
  
  /reviews:
    post:
      tags: [Reviews]
      summary: Submit a review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - business_id
                - rating
              properties:
                business_id:
                  type: string
                  format: uuid
                inquiry_id:
                  type: string
                  format: uuid
                  description: Optional link to inquiry
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                title:
                  type: string
                comment:
                  type: string
      responses:
        '201':
          description: Review submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Review'

  /businesses/{id}/reviews:
    get:
      tags: [Reviews, Businesses]
      summary: Get reviews for a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, rating_high, rating_low, helpful]
            default: recent
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /reviews/{id}/helpful:
    post:
      tags: [Reviews]
      summary: Mark review as helpful
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Marked as helpful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ==========================================
  # SOS EMERGENCY
  # ==========================================
  
  /sos:
    post:
      tags: [SOS]
      summary: Create SOS emergency request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emergency_type
                - location
                - user_phone
              properties:
                emergency_type:
                  type: string
                  enum: [medical, fire, police, disaster, accident, other]
                location:
                  type: object
                  required:
                    - latitude
                    - longitude
                  properties:
                    latitude:
                      type: number
                    longitude:
                      type: number
                    accuracy:
                      type: number
                      description: GPS accuracy in meters
                location_description:
                  type: string
                  example: "Near Temple, Main Road"
                user_phone:
                  type: string
                details:
                  type: string
                sent_offline:
                  type: boolean
                  default: false
                queued_at:
                  type: string
                  format: date-time
                  description: When was it created offline
      responses:
        '201':
          description: SOS request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SOSRequest'

  /sos/{id}:
    get:
      tags: [SOS]
      summary: Get SOS request status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SOS request details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SOSRequest'

  /sos/{id}/cancel:
    put:
      tags: [SOS]
      summary: Cancel SOS request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SOS request cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /sos/{id}/rate:
    post:
      tags: [SOS]
      summary: Rate SOS response
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
