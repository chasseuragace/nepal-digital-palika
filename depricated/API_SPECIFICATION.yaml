  # ==========================================
  # BUSINESS OWNER ENDPOINTS
  # ==========================================
  
  /businesses/register:
    post:
      tags: [Businesses]
      summary: Register a new business
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - business_name
                - business_type
                - phone
                - palika_id
                - ward_number
                - address
                - location
                - description
              properties:
                business_name:
                  type: string
                business_type:
                  type: string
                  enum: [accommodation, restaurant, shop, guide, producer, service]
                sub_category:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                palika_id:
                  type: integer
                ward_number:
                  type: integer
                address:
                  type: string
                location:
                  type: string
                  description: "lat,lng"
                  example: "27.7172,85.3240"
                description:
                  type: string
                details:
                  type: string
                  description: "JSON string of business-specific details"
                price_range:
                  type: string
                  description: "JSON string: {min: 1500, max: 2500}"
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "5-10 images"
                business_license:
                  type: string
                  format: binary
                license_number:
                  type: string
                pan_number:
                  type: string
      responses:
        '201':
          description: Business registered (pending verification)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Business'

  /businesses/mine:
    get:
      tags: [Businesses]
      summary: Get my businesses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's businesses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Business'

  /businesses/{id}:
    put:
      tags: [Businesses]
      summary: Update business information
