      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - responder_name
                - responder_phone
              properties:
                responder_name:
                  type: string
                responder_phone:
                  type: string
                responder_eta_minutes:
                  type: integer
      responses:
        '200':
          description: SOS request assigned

  /admin/sos-requests/{id}/status:
    put:
      tags: [Admin, SOS]
      summary: Update SOS request status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [assigned, en_route, on_site, resolved]
                responder_location:
                  type: object
                  properties:
                    latitude:
                      type: number
                    longitude:
                      type: number
                resolution_notes:
                  type: string
      responses:
        '200':
          description: Status updated

  /admin/notifications/send:
    post:
      tags: [Admin, Notifications]
      summary: Send notification to users (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - message
                - notification_type
              properties:
                palika_id:
                  type: integer
                  description: "Null for national notification"
                title:
                  type: string
                message:
                  type: string
                notification_type:
                  type: string
                  enum: [emergency, event, tourism, business, system]
                priority:
                  type: string
                  enum: [low, default, high, max]
                  default: default
                target_criteria:
                  type: object
                  description: "Targeting rules"
                  example:
                    wards: [5, 6]
                    user_types: ["resident"]
                image_url:
                  type: string
                action_url:
                  type: string
                scheduled_at:
                  type: string
                  format: date-time
                  description: "Null for immediate send"
      responses:
        '201':
          description: Notification created/sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Notification'

# ==========================================
# COMPONENTS
# ==========================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token obtained from /auth/verify-otp or /auth/admin/login"

  parameters:
    PalikaId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Palika ID

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "NOT_FOUND"
            message:
              type: string
              example: "Resource not found"
        timestamp:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        total_pages:
          type: integer
          example: 8

    Location:
      type: object
      properties:
        latitude:
          type: number
          example: 27.7172
        longitude:
          type: number
          example: 85.3240

    Palika:
      type: object
      properties:
        id:
          type: integer
        name_en:
          type: string
        name_ne:
          type: string
        type:
          type: string
        code:
          type: string
        district:
          type: object
          properties:
            id:
              type: integer
            name_en:
              type: string
            name_ne:
              type: string
