          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                business_name:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                address:
                  type: string
                description:
                  type: string
                details:
                  type: object
                price_range:
                  type: object
                operating_hours:
                  type: object
      responses:
        '200':
          description: Business updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Business'

    delete:
